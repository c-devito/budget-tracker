<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6f0;
    --surface: #fff8f4;
    --surface2: #fdeee4;
    --border: #f0d9cc;
    --border2: #e8c9b8;
    --text: #4a3728;
    --text2: #8a6555;
    --text3: #b8937f;
    --accent: #d4896a;
    --accent2: #e8b89a;
    --accent3: #c27055;
    --blush: #f5c4ad;
    --danger: #c47070;
    --success: #7aab88;
    --sans: 'DM Sans', sans-serif;
    --serif: 'Playfair Display', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #fdf0e8 0%, #fde8da 50%, #f8ddd0 100%);
  }
  .login-box {
    width: 360px; padding: 52px 44px; border: 1px solid var(--border2); border-radius: 16px;
    background: var(--surface); text-align: center; box-shadow: 0 8px 40px rgba(212,137,106,0.12);
  }
  .login-logo { font-family: var(--serif); font-size: 28px; color: var(--accent); margin-bottom: 6px; font-style: italic; }
  .login-sub { font-size: 12px; color: var(--text3); margin-bottom: 36px; letter-spacing: 0.08em; text-transform: uppercase; }
  .login-box input {
    width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 10px; color: var(--text); font-family: var(--sans); font-size: 14px;
    margin-bottom: 14px; outline: none; text-align: center; letter-spacing: 0.12em;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: var(--sans); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .login-box button:hover { background: var(--accent3); }
  .login-error { font-size: 12px; color: var(--danger); margin-top: 12px; }

  /* APP SHELL */
  #app { display: none; min-height: 100vh; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-family: var(--serif); font-size: 20px; color: var(--accent); font-style: italic; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .logout-btn {
    font-size: 12px; color: var(--text3); background: none;
    border: 1px solid var(--border2); border-radius: 8px; padding: 6px 14px;
    cursor: pointer; transition: all 0.15s; font-family: var(--sans);
  }
  .logout-btn:hover { color: var(--accent); border-color: var(--accent); }
  .loading-badge {
    font-size: 11px; color: var(--text3); background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px;
    display: none; align-items: center; gap: 6px;
  }
  .loading-badge.show { display: flex; }
  .mini-spinner {
    width: 12px; height: 12px; border: 1.5px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
  }

  /* MAIN TABS */
  nav {
    display: flex; padding: 0 32px; border-bottom: 1px solid var(--border);
    background: var(--surface); gap: 4px;
  }
  nav button {
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    padding: 14px 22px; background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text3); cursor: pointer; transition: all 0.15s; margin-bottom: -1px;
  }
  nav button:hover { color: var(--text2); }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 28px 32px; max-width: 1300px; margin: 0 auto; }

  /* DATE FILTER BAR */
  .date-bar {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .date-bar-label { font-size: 12px; color: var(--text3); font-weight: 500; white-space: nowrap; }
  .month-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .month-pill {
    font-size: 12px; padding: 6px 14px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); color: var(--text2);
    transition: all 0.15s; font-family: var(--sans);
  }
  .month-pill:hover { border-color: var(--accent2); color: var(--accent); }
  .month-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .date-divider { width: 1px; height: 28px; background: var(--border2); flex-shrink: 0; }
  .custom-range { display: flex; align-items: center; gap: 8px; }
  .custom-range input[type="date"] {
    padding: 6px 10px; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 12px; outline: none;
  }
  .custom-range input[type="date"]:focus { border-color: var(--accent); }
  .apply-btn {
    padding: 6px 14px; background: var(--accent); border: none; border-radius: 8px;
    color: #fff; font-size: 12px; cursor: pointer; font-family: var(--sans);
  }
  .apply-btn:hover { background: var(--accent3); }
  .date-range-display {
    font-size: 12px; color: var(--text3); font-style: italic; white-space: nowrap;
  }

  /* SUMMARY CARDS */
  .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px;
  }
  .summary-card.highlight { background: linear-gradient(135deg, #fdeee4, #fdf6f0); border-color: var(--accent2); }
  .card-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .card-value { font-family: var(--serif); font-size: 24px; }
  .card-value.positive { color: var(--success); }
  .card-value.negative { color: var(--danger); }
  .card-value.neutral { color: var(--accent); }
  .card-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* DASHBOARD GRID */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 800px) { .dash-grid { grid-template-columns: 1fr; } }
  .dash-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px;
  }
  .dash-panel h3 { font-family: var(--serif); font-size: 16px; color: var(--text); margin-bottom: 16px; font-style: italic; }
  .dash-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .dash-row:last-child { border-bottom: none; }
  .dash-row-label { font-size: 13px; color: var(--text2); }
  .dash-row-value { font-size: 13px; font-weight: 500; color: var(--text); }

  /* BARS */
  .bar-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .bar-row:last-child { border-bottom: none; }
  .bar-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .bar-label { font-size: 12px; color: var(--text2); }
  .bar-val { font-size: 12px; font-weight: 500; color: var(--text); }
  .bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.5s ease; }
  .bar-fill.alt { background: linear-gradient(90deg, #b8d4c8, var(--success)); }

  /* BILLS TRACKER */
  .bill-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .bill-item:last-child { border-bottom: none; }
  .bill-name { font-size: 13px; color: var(--text2); }
  .bill-due { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .bill-amount { font-size: 13px; font-weight: 500; color: var(--text); }

  /* TRANSACTIONS TAB */
  .txn-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .search-wrap input {
    width: 100%; padding: 9px 14px 9px 36px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; color: var(--text);
    font-family: var(--sans); font-size: 13px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); }
  .filter-select {
    padding: 9px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text2); font-family: var(--sans); font-size: 12px; outline: none; cursor: pointer;
  }
  .row-count { font-size: 12px; color: var(--text3); margin-left: auto; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--surface2); }
  th {
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text3); padding: 11px 14px; text-align: left; white-space: nowrap;
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
  }
  th:hover { color: var(--text2); }
  th.sorted { color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fdf0e8; }
  td { padding: 10px 14px; color: var(--text2); white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  td.date-col { font-size: 12px; color: var(--text3); }
  td.amount-pos { color: var(--success); font-weight: 500; }
  td.amount-neg { color: var(--danger); }
  .edit-btn, .del-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; border: 1px solid;
    transition: all 0.15s; background: none; font-family: var(--sans);
  }
  .edit-btn { color: var(--accent); border-color: var(--blush); margin-right: 6px; }
  .edit-btn:hover { background: var(--surface2); }
  .del-btn { color: var(--danger); border-color: #f0c8c8; }
  .del-btn:hover { background: #fdf0f0; }

  /* LOADING / EMPTY */
  .state-msg { text-align: center; padding: 60px 20px; font-size: 13px; color: var(--text3); }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(74,55,40,0.4);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 16px;
    padding: 32px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 12px 48px rgba(212,137,106,0.18);
  }
  .modal h2 { font-family: var(--serif); font-size: 20px; color: var(--accent); margin-bottom: 24px; font-style: italic; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
  .form-group input, .form-group select {
    padding: 9px 12px; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none;
  }
  .form-group input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel {
    padding: 10px 22px; background: none; border: 1px solid var(--border2); border-radius: 10px;
    color: var(--text2); font-family: var(--sans); font-size: 13px; cursor: pointer;
  }
  .btn-save {
    padding: 10px 22px; background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .btn-save:hover { background: var(--accent3); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 300;
    background: var(--surface); border: 1px solid var(--border2); border-radius: 10px;
    padding: 12px 22px; font-size: 13px; color: var(--text);
    transform: translateY(20px); opacity: 0; transition: transform 0.2s, opacity 0.2s; pointer-events: none;
    box-shadow: 0 4px 20px rgba(212,137,106,0.15);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  @media (max-width: 640px) {
    header, nav, main { padding-left: 16px; padding-right: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .summary-cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Budget Tracker</div>
    <div class="login-sub">personal finance</div>
    <input type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password" />
    <button onclick="tryLogin()">Enter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <span class="header-title">Budget Tracker</span>
    <div class="header-right">
      <div class="loading-badge" id="loading-badge">
        <div class="mini-spinner"></div>
        <span id="loading-text">Loading data...</span>
      </div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </header>
  <nav>
    <button id="tab-btn-overview" class="active" onclick="switchTab('overview')">✦ Overview</button>
    <button id="tab-btn-transactions" onclick="switchTab('transactions')">Transactions</button>
  </nav>
  <main id="main-content">
    <div class="state-msg"><span class="spinner"></span> Loading your data — this may take a moment...</div>
  </main>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>Edit Transaction</h2>
    <div class="form-grid" id="edit-form-grid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxo0e8lO7yj-khjETrJNberjWIKiDGKpFRbGbYXcYxxXS5SXiwXzysZEVTPpX2IVzt_7g/exec';
const PASSWORD = 'Loup384!';
// Used only if the backend can't tell us the sheet list (see discoverSheets()).
// Matches every tab in the "2026 Budget" workbook except the config/summary ones below.
const FALLBACK_ACCOUNT_SHEETS = ['Apple Card','AMEX','CapitalOne','CareCreditCD','CareCreditNF','WFCheckingCD','WFCheckingNF','WFCredit','WFSavings'];
// Non-transaction tabs (config/debt/summary sheets) to skip even if the backend reports them.
const EXCLUDE_SHEETS = ['Bills Info','MonthlyBreakdown','SetUp'];
const HEADERS = ['Date','Month','Detail','Deposits','Charges','Amount','Store','Category','Parent Category','Account Type','Account','Trans Type'];

let debtData = [];

// Ask the backend for every sheet/tab in the workbook so new cards don't need a code change.
// Falls back to the hardcoded list if the backend doesn't support 'getSheetNames' yet.
async function discoverSheets() {
  try {
    const data = await api({ action: 'getSheetNames' });
    const names = data && (data.sheets || data.names || data.rows);
    if (Array.isArray(names) && names.length) {
      const flat = names.map(n => Array.isArray(n) ? n[0] : n).filter(Boolean);
      const filtered = flat.filter(n => !EXCLUDE_SHEETS.includes(n));
      if (filtered.length) return filtered;
    }
  } catch (e) { console.log('Backend does not support getSheetNames yet, using fallback list'); }
  return FALLBACK_ACCOUNT_SHEETS;
}

async function loadDebtInfo() {
  try {
    const data = await api({ action: 'getDebtInfo' });
    if (data.rows && data.rows.length > 1) {
      debtData = data.rows.slice(1).map(row => ({
        name: row[0],
        debt: row[1] === 'n/a' || row[1] === '' ? 0 : parseFloat(row[1]) || 0,
        limit: parseFloat(String(row[2]).replace(/[$,]/g,'')) || 0
      })).filter(r => r.name);
    }
  } catch(e) { console.log('Could not load debt info'); }
}

// Bills from your setup sheet
const BILLS = [
  { name: 'Drex', amount: 10.66, due: '3rd', autopay: 'WF Debit' },
  { name: 'Apple One', amount: 25.95, due: '4th', autopay: 'Capital One' },
  { name: 'Nintendo Realms', amount: 4.25, due: '5th', autopay: 'WF Debit' },
  { name: 'CapCut', amount: 21.31, due: '10th', autopay: 'Capital One' },
  { name: 'WiFi + Phone', amount: 117.46, due: '11th', autopay: 'WF Debit' },
  { name: 'Apple iCloud+', amount: 9.99, due: '14th', autopay: 'Capital One' },
  { name: 'Volt Payment', amount: 380.36, due: '16th', autopay: 'WF Debit' },
  { name: 'RV Insurance', amount: 312.16, due: '20th', autopay: 'WF Debit' },
  { name: 'Health Insurance', amount: 253.02, due: '25th', autopay: 'WF Debit' },
  { name: 'Car Insurance', amount: 302.00, due: '28th', autopay: 'WF Debit' },
];

let allTransactions = [];
let filteredTransactions = [];
let dataLoaded = false;
let currentTab = 'overview';
let filterStart = null;
let filterEnd = null;
let activeMonth = null;
let txnSortCol = null;
let txnSortDir = 1;
let editingRow = null;
let txnSearch = '';
let txnAcctFilter = '';
let txnCatFilter = '';

// AUTH
function tryLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    sessionStorage.setItem('bt_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password, try again.';
    document.getElementById('pw-input').value = '';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
function logout() { sessionStorage.removeItem('bt_auth'); location.reload(); }
if (sessionStorage.getItem('bt_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// JSONP API
function api(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    params.callback = cbName;
    const script = document.createElement('script');
    script.src = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
    window[cbName] = (data) => { delete window[cbName]; document.body.removeChild(script); resolve(data); };
    script.onerror = () => { delete window[cbName]; document.body.removeChild(script); reject(new Error('Failed')); };
    document.body.appendChild(script);
  });
}

// LOAD ALL DATA
async function initApp() {
  showLoadingBadge('Loading all accounts...');
  await loadDebtInfo();
  const sheets = await discoverSheets();
  document.getElementById('main-content').innerHTML = '<div class="state-msg"><span class="spinner"></span> Loading your data — fetching all accounts, this may take 10–20 seconds...</div>';
  try {
    const results = await Promise.all(sheets.map(s => api({ action: 'getTransactions', sheet: s })));
    allTransactions = [];
    results.forEach(r => {
      if (r.rows) allTransactions = allTransactions.concat(r.rows);
    });
    // Parse dates
    allTransactions.forEach(t => {
      t._parsedDate = parseSheetDate(t['Date']);
    });
    allTransactions.sort((a,b) => (a._parsedDate||0) - (b._parsedDate||0));
    dataLoaded = true;
    hideLoadingBadge();
    // Default: current month or most recent month in data
    setDefaultDateRange();
    renderCurrentTab();
  } catch(e) {
    hideLoadingBadge();
    document.getElementById('main-content').innerHTML = '<div class="state-msg">Failed to load data. Please refresh and try again.</div>';
  }
}

function parseSheetDate(val) {
  if (!val) return null;
  // Excel serial date (e.g. 46043)
  if (typeof val === 'number' || (!isNaN(val) && String(val).length === 5)) {
    const serial = parseFloat(val);
    if (serial > 40000) {
      const utc = new Date(Date.UTC(1899, 11, 30) + serial * 86400000);
      return utc;
    }
  }
  const d = new Date(val);
  return isNaN(d) ? null : d;
}

function setDefaultDateRange() {
  const dates = allTransactions.map(t => t._parsedDate).filter(Boolean);
  if (!dates.length) return;
  const maxDate = new Date(Math.max(...dates));
  const month = maxDate.getMonth();
  const year = maxDate.getFullYear();
  filterStart = new Date(year, month, 1);
  filterEnd = new Date(year, month + 1, 0);
  activeMonth = month;
}

function getMonthsInData() {
  const seen = new Set();
  const months = [];
  allTransactions.forEach(t => {
    if (t._parsedDate) {
      const key = `${t._parsedDate.getFullYear()}-${t._parsedDate.getMonth()}`;
      if (!seen.has(key)) {
        seen.add(key);
        months.push({ year: t._parsedDate.getFullYear(), month: t._parsedDate.getMonth(), key });
      }
    }
  });
  return months.sort((a,b) => a.year - b.year || a.month - b.month);
}

function getFilteredTxns() {
  return allTransactions.filter(t => {
    if (!t._parsedDate) return false;
    if (filterStart && t._parsedDate < filterStart) return false;
    if (filterEnd && t._parsedDate > filterEnd) return false;
    return true;
  });
}

// TAB SWITCHING
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-btn-' + tab).classList.add('active');
  if (dataLoaded) renderCurrentTab();
}

function renderCurrentTab() {
  if (currentTab === 'overview') renderOverview();
  else renderTransactions();
}

// OVERVIEW
function renderOverview() {
  const months = getMonthsInData();
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fullMonthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const txns = getFilteredTxns();
  const income = txns.filter(t => parseFloat(t['Deposits']) > 0 && t['Trans Type'] !== 'Transfer');
  // Charges is stored as a positive number on credit-card sheets but negative on the
  // WF checking sheets, so compare/sum the absolute value rather than assuming a sign.
  const expenses = txns.filter(t => t['Trans Type'] === 'Expense' && Math.abs(parseFloat(t['Charges'])||0) > 0);
  const totalIncome = income.reduce((s,t) => s + (parseFloat(t['Deposits'])||0), 0);
  const totalExpenses = expenses.reduce((s,t) => s + Math.abs(parseFloat(t['Charges'])||0), 0);
  const net = totalIncome - totalExpenses;

  // Spending by category
  const catMap = {};
  expenses.forEach(t => {
    const cat = t['Parent Category'] || t['Category'] || 'Other';
    catMap[cat] = (catMap[cat]||0) + Math.abs(parseFloat(t['Charges'])||0);
  });
  const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat = cats.length ? cats[0][1] : 1;

  // Spending by account
  const acctMap = {};
  expenses.forEach(t => {
    const acct = t['Account'] || 'Unknown';
    acctMap[acct] = (acctMap[acct]||0) + Math.abs(parseFloat(t['Charges'])||0);
  });
  const accts = Object.entries(acctMap).sort((a,b)=>b[1]-a[1]);
  const maxAcct = accts.length ? accts[0][1] : 1;

  // Date range label
  const rangeLabel = filterStart && filterEnd
    ? `${filterStart.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} — ${filterEnd.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`
    : 'All time';

  // Default custom range values for inputs
  const startVal = filterStart ? filterStart.toISOString().slice(0,10) : '';
  const endVal = filterEnd ? filterEnd.toISOString().slice(0,10) : '';

  document.getElementById('main-content').innerHTML = `
    <div class="date-bar">
      <span class="date-bar-label">Period:</span>
      <div class="month-pills">
        ${months.map(m => `
          <button class="month-pill ${filterStart && filterStart.getMonth()===m.month && filterStart.getFullYear()===m.year && activeMonth!==null ? 'active' : ''}"
            onclick="setMonth(${m.year},${m.month})"
            id="pill-${m.key}">${monthNames[m.month]} ${m.year !== new Date().getFullYear() ? m.year : ''}
          </button>`).join('')}
        <button class="month-pill ${activeMonth === null ? 'active' : ''}" onclick="setAllTime()">All</button>
      </div>
      <div class="date-divider"></div>
      <div class="custom-range">
        <input type="date" id="date-start" value="${startVal}" />
        <span style="font-size:12px;color:var(--text3);">to</span>
        <input type="date" id="date-end" value="${endVal}" />
        <button class="apply-btn" onclick="applyCustomRange()">Apply</button>
      </div>
    </div>

    <div class="summary-cards">
      <div class="summary-card highlight">
        <div class="card-label">Total Income</div>
        <div class="card-value positive">${fmt(totalIncome)}</div>
        <div class="card-sub">${income.length} deposits</div>
      </div>
      <div class="summary-card highlight">
        <div class="card-label">Total Expenses</div>
        <div class="card-value negative">${fmt(totalExpenses)}</div>
        <div class="card-sub">${expenses.length} transactions</div>
      </div>
      <div class="summary-card highlight">
        <div class="card-label">Net</div>
        <div class="card-value ${net >= 0 ? 'positive' : 'negative'}">${fmt(Math.abs(net))}</div>
        <div class="card-sub">${net >= 0 ? 'surplus' : 'deficit'}</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Avg per Transaction</div>
        <div class="card-value neutral">${expenses.length ? fmt(totalExpenses / expenses.length) : '$0'}</div>
        <div class="card-sub">expenses only</div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="dash-panel">
        <h3>Spending by Category</h3>
        ${cats.length === 0 ? '<p style="color:var(--text3);font-size:13px;">No expense data for this period.</p>' :
          cats.map(([cat, val]) => `
            <div class="bar-row">
              <div class="bar-top">
                <span class="bar-label">${cat}</span>
                <span class="bar-val">${fmt(val)}</span>
              </div>
              <div class="bar-bg"><div class="bar-fill" style="width:${((val/maxCat)*100).toFixed(1)}%"></div></div>
            </div>`).join('')}
      </div>

      <div class="dash-panel">
        <h3>Spending by Account</h3>
        ${accts.length === 0 ? '<p style="color:var(--text3);font-size:13px;">No data for this period.</p>' :
          accts.map(([acct, val]) => `
            <div class="bar-row">
              <div class="bar-top">
                <span class="bar-label">${acct}</span>
                <span class="bar-val">${fmt(val)}</span>
              </div>
              <div class="bar-bg"><div class="bar-fill alt" style="width:${((val/maxAcct)*100).toFixed(1)}%"></div></div>
            </div>`).join('')}
      </div>
    </div>
<div class="dash-panel" style="margin-bottom:24px;">
      <h3>Debt Overview</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 32px;">
        ${debtData.map(card => {
          const pct = card.limit ? Math.min(100, (card.debt / card.limit) * 100) : 0;
          const color = pct > 70 ? 'var(--danger)' : pct > 40 ? 'var(--gold, #d4a96a)' : 'var(--success)';
          return `
            <div style="padding:10px 0;border-bottom:1px solid var(--border);">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                <span style="font-size:13px;color:var(--text2);">${card.name}</span>
                <span style="font-size:13px;font-weight:500;color:var(--text);">${card.debt > 0 ? fmt(card.debt) : '—'} <span style="font-size:11px;color:var(--text3);">/ ${fmt(card.limit)}</span></span>
              </div>
              <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${pct.toFixed(1)}%;background:${color};border-radius:3px;transition:width 0.5s;"></div>
              </div>
              <div style="font-size:11px;color:var(--text3);margin-top:3px;">${pct.toFixed(0)}% utilized</div>
            </div>`;
        }).join('')}
        <div style="padding:10px 0;grid-column:1/-1;display:flex;justify-content:space-between;">
          <span style="font-size:13px;font-weight:500;color:var(--text);">Total Debt</span>
          <span style="font-size:13px;font-weight:500;color:var(--danger);">${fmt(debtData.reduce((s,c)=>s+c.debt,0))}</span>
        </div>
      </div>
    </div>
    <div class="dash-panel" style="margin-bottom:24px;">
      <h3>Bills Tracker</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 32px;">
        ${BILLS.map(b => `
          <div class="bill-item">
            <div>
              <div class="bill-name">${b.name}</div>
              <div class="bill-due">Due ${b.due} · ${b.autopay}</div>
            </div>
            <div class="bill-amount">${fmt(b.amount)}</div>
          </div>`).join('')}
        <div class="bill-item" style="grid-column:1/-1;">
          <div><div class="bill-name" style="font-weight:500;color:var(--text);">Monthly Total</div></div>
          <div class="bill-amount" style="color:var(--accent);">${fmt(BILLS.reduce((s,b)=>s+b.amount,0))}</div>
        </div>
      </div>
    </div>
  `;

  // Set active pill
  if (activeMonth !== null && filterStart) {
    const key = `${filterStart.getFullYear()}-${filterStart.getMonth()}`;
    const pill = document.getElementById('pill-' + key);
    if (pill) pill.classList.add('active');
  }
}

function setMonth(year, month) {
  filterStart = new Date(year, month, 1);
  filterEnd = new Date(year, month + 1, 0);
  activeMonth = month;
  renderOverview();
}

function setAllTime() {
  const dates = allTransactions.map(t => t._parsedDate).filter(Boolean);
  if (!dates.length) return;
  filterStart = new Date(Math.min(...dates));
  filterEnd = new Date(Math.max(...dates));
  activeMonth = null;
  renderOverview();
}

function applyCustomRange() {
  const s = document.getElementById('date-start').value;
  const e = document.getElementById('date-end').value;
  if (!s || !e) { showToast('Please select both a start and end date', 'error'); return; }
  filterStart = new Date(s + 'T00:00:00');
  filterEnd = new Date(e + 'T23:59:59');
  activeMonth = null;
  renderOverview();
}

// TRANSACTIONS
function renderTransactions() {
  let txns = allTransactions;
  if (txnSearch) txns = txns.filter(t => HEADERS.some(h => String(t[h]).toLowerCase().includes(txnSearch)));
  if (txnAcctFilter) txns = txns.filter(t => t['Account'] === txnAcctFilter);
  if (txnCatFilter) txns = txns.filter(t => t['Category'] === txnCatFilter);
  if (txnSortCol) {
    const nc = ['Deposits','Charges','Amount'];
    txns = [...txns].sort((a,b) => {
      let av = a[txnSortCol], bv = b[txnSortCol];
      if (nc.includes(txnSortCol)) { av = parseFloat(av)||0; bv = parseFloat(bv)||0; }
      return av < bv ? -txnSortDir : av > bv ? txnSortDir : 0;
    });
  }

  const accts = [...new Set(allTransactions.map(t=>t['Account']).filter(Boolean))].sort();
  const cats = [...new Set(allTransactions.map(t=>t['Category']).filter(Boolean))].sort();
  const vis = ['Date','Account','Detail','Deposits','Charges','Amount','Category','Store'];

  document.getElementById('main-content').innerHTML = `
    <div class="txn-controls">
      <div class="search-wrap">
        <span class="search-icon">&#9906;</span>
        <input type="text" id="txn-search" placeholder="Search all transactions..." value="${txnSearch}" oninput="txnSearchChange(this.value)" />
      </div>
      <select class="filter-select" onchange="txnAcctChange(this.value)">
        <option value="">All accounts</option>
        ${accts.map(a=>`<option value="${a}" ${a===txnAcctFilter?'selected':''}>${a}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="txnCatChange(this.value)">
        <option value="">All categories</option>
        ${cats.map(c=>`<option value="${c}" ${c===txnCatFilter?'selected':''}>${c}</option>`).join('')}
      </select>
      <span class="row-count">${txns.length.toLocaleString()} transactions</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          ${vis.map(h=>`<th onclick="txnSort('${h}')" class="${txnSortCol===h?'sorted':''}">${h}${txnSortCol===h?(txnSortDir===1?' ↑':' ↓'):''}</th>`).join('')}
          <th>Actions</th>
        </tr></thead>
        <tbody>
          ${txns.length === 0
            ? `<tr><td colspan="${vis.length+1}" class="state-msg">No transactions found</td></tr>`
            : txns.map(row=>`
              <tr>
                <td class="date-col">${fmtDate(row['Date'])}</td>
                <td>${row['Account']||'—'}</td>
                <td title="${row['Detail']}">${row['Detail']||'—'}</td>
                <td class="${row['Deposits']?'amount-pos':''}">${row['Deposits']?fmt(row['Deposits']):''}</td>
                <td class="${row['Charges']?'amount-neg':''}">${row['Charges']?fmt(row['Charges']):''}</td>
                <td class="${parseFloat(row['Amount'])>=0?'amount-pos':'amount-neg'}">${row['Amount']!==''?fmt(row['Amount']):''}</td>
                <td>${row['Category']||'—'}</td>
                <td title="${row['Store']}">${row['Store']||'—'}</td>
                <td>
                  <button class="edit-btn" onclick='openEdit(${JSON.stringify(row)})'>Edit</button>
                  <button class="del-btn" onclick="confirmDelete('${row['Account']}',${row._row})">Delete</button>
                </td>
              </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function txnSearchChange(v) { txnSearch = v.toLowerCase(); renderTransactions(); }
function txnAcctChange(v) { txnAcctFilter = v; renderTransactions(); }
function txnCatChange(v) { txnCatFilter = v; renderTransactions(); }
function txnSort(col) {
  if (txnSortCol === col) txnSortDir *= -1; else { txnSortCol = col; txnSortDir = 1; }
  renderTransactions();
}

// EDIT
function openEdit(row) {
  editingRow = row;
  document.getElementById('edit-form-grid').innerHTML = HEADERS.map(h=>`
    <div class="form-group ${['Detail','Store'].includes(h)?'full':''}">
      <label>${h}</label>
      <input type="text" id="field-${h.replace(/\s/g,'_')}" value="${row[h]!==undefined?String(row[h]).replace(/"/g,'&quot;'):''}"/>
    </div>`).join('');
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() { document.getElementById('edit-modal').classList.remove('open'); editingRow = null; }
async function saveEdit() {
  if (!editingRow) return;
  const data = {};
  HEADERS.forEach(h => { data[h] = document.getElementById('field-'+h.replace(/\s/g,'_')).value; });
  try {
    await api({ action: 'updateTransaction', sheet: editingRow['Account'], row: editingRow._row, data: JSON.stringify(data) });
    // Update in memory
    const idx = allTransactions.findIndex(t => t._row === editingRow._row && t['Account'] === editingRow['Account']);
    if (idx !== -1) { Object.assign(allTransactions[idx], data); allTransactions[idx]._parsedDate = parseSheetDate(data['Date']); }
    closeModal();
    showToast('Transaction updated ✓', 'success');
    renderCurrentTab();
  } catch(e) { showToast('Error saving — please try again', 'error'); }
}
async function confirmDelete(sheet, rowNum) {
  if (!confirm('Delete this transaction? This cannot be undone.')) return;
  try {
    await api({ action: 'deleteTransaction', sheet, row: rowNum });
    allTransactions = allTransactions.filter(t => !(t._row === rowNum && t['Account'] === sheet));
    showToast('Transaction deleted', 'success');
    renderCurrentTab();
  } catch(e) { showToast('Error deleting — please try again', 'error'); }
}

// HELPERS
function fmt(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return '$0.00';
  return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDate(val) {
  const d = parseSheetDate(val);
  if (!d) return '—';
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'2-digit'});
}
function showLoadingBadge(msg) {
  const b = document.getElementById('loading-badge');
  document.getElementById('loading-text').textContent = msg;
  b.classList.add('show');
}
function hideLoadingBadge() { document.getElementById('loading-badge').classList.remove('show'); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

document.getElementById('edit-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
if (sessionStorage.getItem('bt_auth') === '1') initApp();
</script>
